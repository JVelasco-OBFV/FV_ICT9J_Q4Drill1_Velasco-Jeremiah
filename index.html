<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        .container{
            background-color: green;
            color: rgb(255, 196, 0);
            padding: 30px;
            margin-top: 120px;
            text-align: center;
            border-radius: 40px;
            font-family: Gill Sans MT;
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>Electricity Consumption</h1>
    <br>
    <details ontoggle="helpHere()">
        <summary>
            <u>Instructions</u>
        </summary>
        <br>
        <i id="help"></i>
    </details>

    <form action="#">
        <input type="number" class="form-control" id="kWh">
        <br>

        <button onclick="checkKWh()" class="btn btn-warning" type="button">Check KWh</button>
        <br>
    </form>
    </div>

    <script> 
        function helpHere() {
            document.getElementById('help').innerHTML= "insert your daily electricity consumption in the input box to determine the condition of your electric supply"
        }
        function checkKWh() {//status variables
            let Kwh = document.getElementById('kWh').value;
            let A = "Lifetime Consumer";
            let B = "Low Consumer";
            let C = "Average Consumer";
            let D = "Costly Consumer";
            let E = "Excessive Consumer";

            if (isNaN(Kwh) || Kwh < 0) {// determining the statuses
                alert('Please input a realistic value!');
            }
            else if (Kwh <= 100) {
                alert('You are a ' + A + '. You uphold discounted electricity rates');
            } else if (Kwh > 100 && Kwh <= 200) {
                alert('You are a ' + B + '. You uphold a normal residential rate');
            } else if (Kwh > 201 && Kwh <=300) {
                alert('You are a ' + C + '. You uphold a typical electrical usage');
            } else if (Kwh > 301 && Kwh <=500) {
                alert('You are a ' + D + '. You uphold a high electricity rate');
            } else {
                alert('You are a ' + E + '. You uphold a very high consumption of electricity');
            }

            
        }
    </script>
</body>
</html>
