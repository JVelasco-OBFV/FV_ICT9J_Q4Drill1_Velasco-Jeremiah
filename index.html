<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <h1>Electricity Consumption</h1>
    <br>
    <details ontoggle="helpHere()">
        <summary>
            <u>Instructions</u>
        </summary>
        <br>
        <i id="help"></i>
    </details>

    <form action="#">
        <input type="number" class="form-control" id="kWh">
        <br>

        <button onclick="checkKWh()" class="btn btn-success" type="button">Check KWh</button>
        <br>
        <p><span id="result"></span></p>
    </form>

    <script> 
        function helpHere() {
            document.getElementById('help').innerHTML= "insert your daily electricity consumption in the input box to determine the condition of your electric supply"
        }
        function checkKWh() {
            let Kwh = document.getElementById('kWh').value;
            let A = "Lifetime Consumer"
            let B = "Low Consumer"
            let C = "Average Consumer"
            let D = "Costly Consumer"
            let E = "Excessive Consumer"

            if (isNan(Kwh) || Kwh < 0) {
                alert('Please input a realistic value!');
            }
            else if (Kwh <= 100) {
                alert('You are a ' + A);
            } else if (Kwh > 100 && Kwh <= 200) {
                alert('You are a ' + B);
            } else if (Kwh > 201 && Kwh <=300) {
                alert('You are a ' + C);
            } else if (Kwh > 301 && Kwh <=500) {
                alert('You are a ' + D);
            } else {
                alert('You are a ' + E);
            }
            
        }
    </script>
</body>
</html>
